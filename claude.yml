name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Claude App Review
        uses: anthropics/claude-github-app@v1 # Pastikan menggunakan versi terbaru
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
